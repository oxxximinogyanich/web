<html>
<head>
    <meta charset="UTF-8">
    <title>Приветствие</title>
</head>
<body>
    <h2>Введите имя и возраст</h2>

    <form method="GET" action="cgi-bin/privet1.pl">
        Имя: <input type="text" name="name"><br><br>
        Возраст: <input type="text" name="age"><br><br>
        <input type="submit" value="Показать приветствие">
    </form>
</body>
</html>

cgi-bin/privet1.pl
cgi-bin/privet2.pl

cgi-bin/privet4.pl
